<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2a3a5c"/>
      <stop offset="100%" stop-color="#1a1a3a"/>
    </radialGradient>
    <radialGradient id="face" cx="50%" cy="40%" r="40%">
      <stop offset="0%" stop-color="#f5d0a9"/>
      <stop offset="100%" stop-color="#d4a574"/>
    </radialGradient>
  </defs>
  <circle cx="100" cy="100" r="100" fill="url(#bg)"/>
  <!-- Hair -->
  <ellipse cx="100" cy="72" rx="58" ry="50" fill="#c0c0c0"/>
  <!-- Face -->
  <ellipse cx="100" cy="90" rx="45" ry="48" fill="url(#face)"/>
  <!-- Eyes -->
  <ellipse cx="82" cy="82" rx="5" ry="4" fill="#3a3a3a"/>
  <ellipse cx="118" cy="82" rx="5" ry="4" fill="#3a3a3a"/>
  <!-- Warm smile -->
  <path d="M 80 100 Q 100 118 120 100" stroke="#8b6548" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Glasses -->
  <circle cx="82" cy="82" r="14" stroke="#82dcff" stroke-width="1.5" fill="none" opacity="0.6"/>
  <circle cx="118" cy="82" r="14" stroke="#82dcff" stroke-width="1.5" fill="none" opacity="0.6"/>
  <line x1="96" y1="82" x2="104" y2="82" stroke="#82dcff" stroke-width="1.5" opacity="0.6"/>
  <!-- Cheeks -->
  <circle cx="72" cy="95" r="8" fill="#e8a0a0" opacity="0.3"/>
  <circle cx="128" cy="95" r="8" fill="#e8a0a0" opacity="0.3"/>
</svg>
