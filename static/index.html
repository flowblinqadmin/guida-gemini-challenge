<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guida — AI Shopping Grandmother</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a1a;
      color: #e0e8ff;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    /* Main layout */
    .app {
      display: grid;
      grid-template-columns: 1fr 380px;
      grid-template-rows: 1fr auto;
      height: 100vh;
      gap: 0;
    }

    /* Camera / video feed area */
    .camera-area {
      position: relative;
      background: #0d0d24;
      overflow: hidden;
    }

    #cameraFeed {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
      opacity: 0.85;
    }

    /* Guida avatar overlay — floats over camera */
    .guida-overlay {
      position: absolute;
      bottom: 20px;
      left: 20px;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      border: 3px solid rgba(100, 180, 255, 0.6);
      box-shadow:
        0 0 30px rgba(100, 180, 255, 0.3),
        0 0 60px rgba(100, 180, 255, 0.15),
        inset 0 0 30px rgba(100, 180, 255, 0.1);
      overflow: hidden;
      animation: guidaPulse 3s ease-in-out infinite;
    }

    .guida-overlay img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .guida-overlay.speaking {
      border-color: rgba(130, 220, 255, 0.9);
      box-shadow:
        0 0 40px rgba(130, 220, 255, 0.5),
        0 0 80px rgba(130, 220, 255, 0.25),
        inset 0 0 40px rgba(130, 220, 255, 0.15);
      animation: guidaSpeaking 0.8s ease-in-out infinite;
    }

    @keyframes guidaPulse {
      0%, 100% { box-shadow: 0 0 30px rgba(100, 180, 255, 0.3), 0 0 60px rgba(100, 180, 255, 0.15); }
      50% { box-shadow: 0 0 40px rgba(100, 180, 255, 0.4), 0 0 80px rgba(100, 180, 255, 0.2); }
    }

    @keyframes guidaSpeaking {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }

    /* Scan line effect */
    .camera-area::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(100, 180, 255, 0.03) 2px,
        rgba(100, 180, 255, 0.03) 4px
      );
      pointer-events: none;
    }

    /* Product cards panel */
    .sidebar {
      background: rgba(15, 15, 35, 0.95);
      border-left: 1px solid rgba(100, 180, 255, 0.15);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 16px 20px;
      border-bottom: 1px solid rgba(100, 180, 255, 0.1);
      font-size: 14px;
      color: rgba(180, 210, 255, 0.7);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Chat / transcript area */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .chat-msg {
      padding: 10px 14px;
      border-radius: 12px;
      max-width: 95%;
      font-size: 14px;
      line-height: 1.5;
      animation: fadeIn 0.3s ease;
    }

    .chat-msg.guida {
      background: rgba(100, 180, 255, 0.1);
      border: 1px solid rgba(100, 180, 255, 0.15);
      align-self: flex-start;
    }

    .chat-msg.user {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      align-self: flex-end;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Product cards — holographic style */
    .product-cards {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 0 20px 16px;
    }

    .product-card {
      background: linear-gradient(135deg, rgba(100, 180, 255, 0.08), rgba(150, 100, 255, 0.05));
      border: 1px solid rgba(100, 180, 255, 0.2);
      border-radius: 12px;
      padding: 14px;
      display: grid;
      grid-template-columns: 60px 1fr auto;
      gap: 12px;
      align-items: center;
      animation: cardSlideIn 0.4s ease;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .product-card:hover {
      border-color: rgba(100, 180, 255, 0.4);
      box-shadow: 0 0 20px rgba(100, 180, 255, 0.1);
    }

    .product-card img {
      width: 60px;
      height: 60px;
      border-radius: 8px;
      object-fit: cover;
      background: rgba(255, 255, 255, 0.05);
    }

    .product-info h4 {
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 4px;
      color: #e0e8ff;
    }

    .product-info .price {
      font-size: 15px;
      font-weight: 600;
      color: #82dcff;
    }

    .product-info .availability {
      font-size: 11px;
      color: rgba(130, 220, 130, 0.8);
    }

    .add-btn {
      background: rgba(100, 180, 255, 0.15);
      border: 1px solid rgba(100, 180, 255, 0.3);
      color: #82dcff;
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
    }

    .add-btn:hover {
      background: rgba(100, 180, 255, 0.25);
    }

    @keyframes cardSlideIn {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }

    /* Controls bar */
    .controls {
      grid-column: 1 / -1;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      padding: 16px;
      background: rgba(10, 10, 30, 0.95);
      border-top: 1px solid rgba(100, 180, 255, 0.1);
    }

    .ctrl-btn {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: 2px solid rgba(100, 180, 255, 0.3);
      background: rgba(100, 180, 255, 0.08);
      color: #82dcff;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .ctrl-btn:hover {
      background: rgba(100, 180, 255, 0.15);
      border-color: rgba(100, 180, 255, 0.5);
    }

    .ctrl-btn.active {
      background: rgba(100, 180, 255, 0.2);
      border-color: rgba(100, 180, 255, 0.6);
      box-shadow: 0 0 20px rgba(100, 180, 255, 0.2);
    }

    .ctrl-btn.end-call {
      background: rgba(255, 80, 80, 0.2);
      border-color: rgba(255, 80, 80, 0.4);
      color: #ff6060;
    }

    .ctrl-btn.end-call:hover {
      background: rgba(255, 80, 80, 0.3);
    }

    /* Status indicator */
    .status {
      position: absolute;
      top: 16px;
      left: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: rgba(180, 210, 255, 0.6);
      z-index: 10;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #555;
    }

    .status-dot.connected {
      background: #4caf50;
      box-shadow: 0 0 8px rgba(76, 175, 80, 0.5);
    }

    .status-dot.connecting {
      background: #ff9800;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Start screen */
    .start-screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(10, 10, 26, 0.97);
      z-index: 100;
      gap: 24px;
    }

    .start-screen h1 {
      font-size: 48px;
      font-weight: 300;
      color: #82dcff;
      letter-spacing: 4px;
    }

    .start-screen p {
      font-size: 16px;
      color: rgba(180, 210, 255, 0.6);
      max-width: 400px;
      text-align: center;
      line-height: 1.6;
    }

    .start-btn {
      margin-top: 16px;
      padding: 16px 48px;
      border-radius: 32px;
      border: 2px solid rgba(100, 180, 255, 0.4);
      background: rgba(100, 180, 255, 0.1);
      color: #82dcff;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.3s ease;
      letter-spacing: 1px;
    }

    .start-btn:hover {
      background: rgba(100, 180, 255, 0.2);
      border-color: rgba(100, 180, 255, 0.6);
      box-shadow: 0 0 30px rgba(100, 180, 255, 0.2);
    }

    .start-screen.hidden { display: none; }

    /* Scrollbar styling */
    .chat-area::-webkit-scrollbar { width: 4px; }
    .chat-area::-webkit-scrollbar-track { background: transparent; }
    .chat-area::-webkit-scrollbar-thumb { background: rgba(100, 180, 255, 0.2); border-radius: 2px; }
  </style>
</head>
<body>
  <!-- Start screen -->
  <div class="start-screen" id="startScreen">
    <h1>GUIDA</h1>
    <p>Your AI shopping grandmother for baby food introduction. Voice-powered, camera-aware, backed by FlowBlinq commerce.</p>
    <button class="start-btn" id="startBtn">Start Conversation</button>
  </div>

  <!-- Main app -->
  <div class="app">
    <!-- Camera area -->
    <div class="camera-area">
      <div class="status">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">Disconnected</span>
      </div>
      <video id="cameraFeed" autoplay playsinline muted></video>
      <div class="guida-overlay" id="guidaAvatar">
        <img src="/static/guida-placeholder.svg" alt="Guida" id="guidaImg">
      </div>
    </div>

    <!-- Sidebar: chat + products -->
    <div class="sidebar">
      <div class="sidebar-header">Guida's Recommendations</div>
      <div class="chat-area" id="chatArea"></div>
      <div class="product-cards" id="productCards"></div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <button class="ctrl-btn active" id="micBtn" title="Microphone">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/>
          <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
        </svg>
      </button>
      <button class="ctrl-btn" id="camBtn" title="Camera">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/>
        </svg>
      </button>
      <button class="ctrl-btn end-call" id="endBtn" title="End">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 9c-1.6 0-3.15.25-4.6.72v3.1c0 .39-.23.74-.56.9-.98.49-1.87 1.12-2.66 1.85-.18.18-.43.28-.7.28-.28 0-.53-.11-.71-.29L.29 13.08c-.18-.17-.29-.42-.29-.7 0-.28.11-.53.29-.71C3.34 8.78 7.46 7 12 7s8.66 1.78 11.71 4.67c.18.18.29.43.29.71 0 .28-.11.53-.29.71l-2.48 2.48c-.18.18-.43.29-.71.29-.27 0-.52-.11-.7-.28-.79-.74-1.69-1.36-2.67-1.85-.33-.16-.56-.5-.56-.9v-3.1C15.15 9.25 13.6 9 12 9z"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Audio context for playback -->
  <script src="/static/app.js"></script>
</body>
</html>
