<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guida — AI Shopping Grandmother</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a1a;
      color: #e0e8ff;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    /* Main layout */
    .app {
      display: grid;
      grid-template-columns: 1fr 380px;
      grid-template-rows: 1fr auto;
      height: 100vh;
      gap: 0;
    }

    /* Camera / video feed area */
    .camera-area {
      position: relative;
      background: #0d0d24;
      overflow: hidden;
    }

    /* Camera is PIP in corner when active, hidden when off */
    #cameraFeed {
      position: absolute;
      bottom: 20px;
      right: 20px;
      width: 180px;
      height: 180px;
      object-fit: cover;
      transform: scaleX(-1);
      border-radius: 12px;
      border: 2px solid rgba(100, 180, 255, 0.3);
      z-index: 10;
      display: none;
    }

    #cameraFeed.active {
      display: block;
    }

    /* Guida — large centered video-style avatar */
    .guida-container {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .guida-overlay {
      width: 420px;
      height: 420px;
      border-radius: 50%;
      border: 3px solid rgba(100, 180, 255, 0.5);
      box-shadow:
        0 0 40px rgba(100, 180, 255, 0.25),
        0 0 80px rgba(100, 180, 255, 0.1),
        inset 0 0 40px rgba(100, 180, 255, 0.08);
      overflow: hidden;
      position: relative;
      animation: guidaIdle 4s ease-in-out infinite;
      transition: all 0.4s ease;
    }

    .guida-overlay img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(1.05) contrast(1.05);
    }

    /* Speaking state — glowing ring + subtle scale pulse */
    .guida-overlay.speaking {
      border-color: rgba(130, 220, 255, 0.9);
      box-shadow:
        0 0 50px rgba(130, 220, 255, 0.5),
        0 0 100px rgba(130, 220, 255, 0.2),
        0 0 150px rgba(100, 180, 255, 0.1),
        inset 0 0 40px rgba(130, 220, 255, 0.1);
      animation: guidaSpeaking 1.2s ease-in-out infinite;
    }

    /* Audio waveform ring — visible when speaking */
    .guida-overlay::after {
      content: '';
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 2px solid transparent;
      transition: all 0.3s ease;
    }

    .guida-overlay.speaking::after {
      border-color: rgba(130, 220, 255, 0.3);
      animation: waveRing 0.6s ease-in-out infinite alternate;
    }

    /* Listening state */
    .guida-overlay.listening {
      border-color: rgba(100, 255, 180, 0.6);
      box-shadow:
        0 0 30px rgba(100, 255, 180, 0.2),
        0 0 60px rgba(100, 255, 180, 0.1);
    }

    @keyframes guidaIdle {
      0%, 100% {
        box-shadow: 0 0 40px rgba(100, 180, 255, 0.25), 0 0 80px rgba(100, 180, 255, 0.1);
        transform: scale(1);
      }
      50% {
        box-shadow: 0 0 50px rgba(100, 180, 255, 0.3), 0 0 90px rgba(100, 180, 255, 0.15);
        transform: scale(1.005);
      }
    }

    @keyframes guidaSpeaking {
      0%, 100% { transform: scale(1); }
      25% { transform: scale(1.02); }
      75% { transform: scale(0.99); }
    }

    @keyframes waveRing {
      0% { inset: -8px; opacity: 0.5; }
      100% { inset: -16px; opacity: 0; }
    }

    /* Name label under avatar */
    .guida-label {
      position: absolute;
      bottom: -36px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 14px;
      letter-spacing: 3px;
      color: rgba(130, 200, 255, 0.6);
      text-transform: uppercase;
    }

    /* Scan line effect */
    .camera-area::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(100, 180, 255, 0.03) 2px,
        rgba(100, 180, 255, 0.03) 4px
      );
      pointer-events: none;
    }

    /* Sidebar — 3 sections: chat, products, cart */
    .sidebar {
      background: rgba(15, 15, 35, 0.95);
      border-left: 1px solid rgba(100, 180, 255, 0.15);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 12px 20px;
      border-bottom: 1px solid rgba(100, 180, 255, 0.1);
      font-size: 12px;
      color: rgba(180, 210, 255, 0.5);
      text-transform: uppercase;
      letter-spacing: 1px;
      flex-shrink: 0;
    }

    /* Chat / transcript area — top section, scrollable */
    .chat-area {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .chat-msg {
      padding: 10px 14px;
      border-radius: 12px;
      max-width: 95%;
      font-size: 14px;
      line-height: 1.5;
      animation: fadeIn 0.3s ease;
    }

    .chat-msg.guida {
      background: rgba(100, 180, 255, 0.1);
      border: 1px solid rgba(100, 180, 255, 0.15);
      align-self: flex-start;
    }

    .chat-msg.user {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      align-self: flex-end;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Product cards — middle section, scrollable */
    .product-cards {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 8px 16px;
      max-height: 35vh;
      overflow-y: auto;
      flex-shrink: 0;
      border-top: 1px solid rgba(100, 180, 255, 0.1);
    }

    .product-cards:empty {
      display: none;
    }

    .product-cards-header {
      font-size: 11px;
      color: rgba(180, 210, 255, 0.4);
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 8px 16px 0;
      flex-shrink: 0;
    }

    .product-cards-header:empty { display: none; }

    .product-card {
      background: linear-gradient(135deg, rgba(100, 180, 255, 0.08), rgba(150, 100, 255, 0.05));
      border: 1px solid rgba(100, 180, 255, 0.2);
      border-radius: 12px;
      padding: 14px;
      display: grid;
      grid-template-columns: 60px 1fr auto;
      gap: 12px;
      align-items: center;
      animation: cardSlideIn 0.4s ease;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .product-card:hover {
      border-color: rgba(100, 180, 255, 0.4);
      box-shadow: 0 0 20px rgba(100, 180, 255, 0.1);
    }

    .product-card img {
      width: 60px;
      height: 60px;
      border-radius: 8px;
      object-fit: cover;
      background: rgba(255, 255, 255, 0.05);
    }

    .product-info h4 {
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 4px;
      color: #e0e8ff;
    }

    .product-info .price {
      font-size: 15px;
      font-weight: 600;
      color: #82dcff;
    }

    .product-info .availability {
      font-size: 11px;
      color: rgba(130, 220, 130, 0.8);
    }

    .add-btn {
      background: rgba(100, 180, 255, 0.15);
      border: 1px solid rgba(100, 180, 255, 0.3);
      color: #82dcff;
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
    }

    .add-btn:hover {
      background: rgba(100, 180, 255, 0.25);
    }

    @keyframes cardSlideIn {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }

    /* Controls bar */
    .controls {
      grid-column: 1 / -1;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      padding: 16px;
      background: rgba(10, 10, 30, 0.95);
      border-top: 1px solid rgba(100, 180, 255, 0.1);
    }

    .ctrl-btn {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: 2px solid rgba(100, 180, 255, 0.3);
      background: rgba(100, 180, 255, 0.08);
      color: #82dcff;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .ctrl-btn:hover {
      background: rgba(100, 180, 255, 0.15);
      border-color: rgba(100, 180, 255, 0.5);
    }

    .ctrl-btn.active {
      background: rgba(100, 180, 255, 0.2);
      border-color: rgba(100, 180, 255, 0.6);
      box-shadow: 0 0 20px rgba(100, 180, 255, 0.2);
    }

    .ctrl-btn.end-call {
      background: rgba(255, 80, 80, 0.2);
      border-color: rgba(255, 80, 80, 0.4);
      color: #ff6060;
    }

    .ctrl-btn.end-call:hover {
      background: rgba(255, 80, 80, 0.3);
    }

    /* Cart panel — bottom section, fixed */
    .cart-panel {
      display: none;
      background: rgba(10, 15, 35, 0.98);
      border-top: 1px solid rgba(100, 180, 255, 0.2);
      padding: 12px 16px;
      max-height: 240px;
      overflow-y: auto;
      flex-shrink: 0;
    }

    .cart-panel.visible {
      display: block;
      animation: cartSlideUp 0.3s ease;
    }

    @keyframes cartSlideUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .cart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .cart-header h3 {
      font-size: 14px;
      color: #82dcff;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .cart-item {
      display: grid;
      grid-template-columns: 40px 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .cart-item img {
      width: 40px;
      height: 40px;
      border-radius: 6px;
      object-fit: cover;
    }

    .cart-item-info { font-size: 13px; }
    .cart-item-info .name { color: #e0e8ff; }
    .cart-item-info .qty { color: rgba(180, 210, 255, 0.5); font-size: 11px; }
    .cart-item-price { color: #82dcff; font-weight: 600; font-size: 14px; }

    .cart-totals {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(100, 180, 255, 0.15);
    }

    .cart-total-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: rgba(180, 210, 255, 0.6);
      margin-bottom: 4px;
    }

    .cart-total-row.total {
      color: #e0e8ff;
      font-size: 16px;
      font-weight: 600;
      margin-top: 8px;
    }

    .checkout-btn {
      width: 100%;
      margin-top: 14px;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #4a90d9, #6c5ce7);
      color: white;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      letter-spacing: 0.5px;
    }

    .checkout-btn:hover {
      background: linear-gradient(135deg, #5a9fe9, #7c6cf7);
      box-shadow: 0 4px 20px rgba(108, 92, 231, 0.3);
    }

    .checkout-btn.pulse {
      animation: checkoutPulse 1.5s ease-in-out 3;
    }

    @keyframes checkoutPulse {
      0%, 100% { box-shadow: none; }
      50% { box-shadow: 0 0 20px rgba(108, 92, 231, 0.5), 0 0 40px rgba(108, 92, 231, 0.2); }
    }

    /* Powered by FlowBlinq */
    .powered-by {
      padding: 10px 20px;
      text-align: center;
      font-size: 11px;
      color: rgba(180, 210, 255, 0.35);
      border-top: 1px solid rgba(100, 180, 255, 0.08);
      letter-spacing: 0.5px;
    }

    .powered-by a {
      color: rgba(130, 200, 255, 0.5);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }

    .powered-by a:hover {
      color: rgba(130, 200, 255, 0.8);
    }

    /* Checkout success overlay */
    .checkout-success {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10, 10, 26, 0.95);
      z-index: 200;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }

    .checkout-success.visible {
      display: flex;
    }

    .checkout-success .check-icon {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: rgba(76, 175, 80, 0.15);
      border: 3px solid rgba(76, 175, 80, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      animation: scaleIn 0.4s ease;
    }

    .checkout-success h2 {
      color: #82dcff;
      font-weight: 400;
      font-size: 24px;
    }

    .checkout-success .order-details {
      color: rgba(180, 210, 255, 0.6);
      text-align: center;
      line-height: 1.8;
      font-size: 14px;
    }

    .checkout-success .continue-btn {
      margin-top: 16px;
      padding: 12px 36px;
      border-radius: 24px;
      border: 1px solid rgba(100, 180, 255, 0.3);
      background: rgba(100, 180, 255, 0.1);
      color: #82dcff;
      font-size: 15px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .checkout-success .continue-btn:hover {
      background: rgba(100, 180, 255, 0.2);
    }

    .checkout-success .powered-by-checkout {
      margin-top: 20px;
      font-size: 12px;
      color: rgba(180, 210, 255, 0.3);
    }

    .checkout-success .powered-by-checkout a {
      color: rgba(130, 200, 255, 0.5);
      text-decoration: none;
    }

    @keyframes scaleIn {
      from { transform: scale(0); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    /* Status indicator */
    .status {
      position: absolute;
      top: 16px;
      left: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: rgba(180, 210, 255, 0.6);
      z-index: 10;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #555;
    }

    .status-dot.connected {
      background: #4caf50;
      box-shadow: 0 0 8px rgba(76, 175, 80, 0.5);
    }

    .status-dot.connecting {
      background: #ff9800;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Start screen */
    .start-screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(10, 10, 26, 0.97);
      z-index: 100;
      gap: 24px;
    }

    .start-screen h1 {
      font-size: 48px;
      font-weight: 300;
      color: #82dcff;
      letter-spacing: 4px;
    }

    .start-screen p {
      font-size: 16px;
      color: rgba(180, 210, 255, 0.6);
      max-width: 400px;
      text-align: center;
      line-height: 1.6;
    }

    .start-btn {
      margin-top: 16px;
      padding: 16px 48px;
      border-radius: 32px;
      border: 2px solid rgba(100, 180, 255, 0.4);
      background: rgba(100, 180, 255, 0.1);
      color: #82dcff;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.3s ease;
      letter-spacing: 1px;
    }

    .start-btn:hover {
      background: rgba(100, 180, 255, 0.2);
      border-color: rgba(100, 180, 255, 0.6);
      box-shadow: 0 0 30px rgba(100, 180, 255, 0.2);
    }

    .start-screen.hidden { display: none; }

    /* Scrollbar styling */
    .chat-area::-webkit-scrollbar { width: 4px; }
    .chat-area::-webkit-scrollbar-track { background: transparent; }
    .chat-area::-webkit-scrollbar-thumb { background: rgba(100, 180, 255, 0.2); border-radius: 2px; }
  </style>
</head>
<body>
  <!-- Start screen -->
  <div class="start-screen" id="startScreen">
    <h1>GUIDA</h1>
    <p>Your AI shopping grandmother for baby food introduction. Voice-powered, camera-aware, backed by FlowBlinq commerce.</p>
    <button class="start-btn" id="startBtn">Start Conversation</button>
    <div style="margin-top: 32px; font-size: 12px; color: rgba(180, 210, 255, 0.3);">
      Commerce powered by <a href="https://www.flowblinq.com" target="_blank" style="color: rgba(130, 200, 255, 0.45); text-decoration: none;">FlowBlinq</a>
    </div>
  </div>

  <!-- Main app -->
  <div class="app">
    <!-- Camera area -->
    <div class="camera-area">
      <div class="status">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">Disconnected</span>
      </div>
      <video id="cameraFeed" autoplay playsinline muted></video>
      <div class="guida-container">
        <div class="guida-overlay" id="guidaAvatar">
          <video id="guidaIdle" src="/static/guida-idle.mp4"
                 autoplay loop muted playsinline
                 style="width:100%;height:100%;object-fit:cover;"></video>
          <video id="guidaSpeaking" src="/static/guida-speaking.mp4"
                 loop muted playsinline
                 style="width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0;opacity:0;transition:opacity 0.4s ease;"></video>
          <div class="guida-label">Guida</div>
        </div>
      </div>
    </div>

    <!-- Sidebar: chat + products -->
    <div class="sidebar">
      <div class="sidebar-header">Conversation</div>
      <div class="chat-area" id="chatArea"></div>
      <div class="product-cards-header" id="productCardsHeader"></div>
      <div class="product-cards" id="productCards"></div>
      <div class="cart-panel" id="cartPanel"></div>
      <div class="powered-by">Commerce powered by <a href="https://www.flowblinq.com" target="_blank">FlowBlinq</a></div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <button class="ctrl-btn active" id="micBtn" title="Microphone">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/>
          <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
        </svg>
      </button>
      <button class="ctrl-btn" id="camBtn" title="Camera">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/>
        </svg>
      </button>
      <button class="ctrl-btn end-call" id="endBtn" title="End">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 9c-1.6 0-3.15.25-4.6.72v3.1c0 .39-.23.74-.56.9-.98.49-1.87 1.12-2.66 1.85-.18.18-.43.28-.7.28-.28 0-.53-.11-.71-.29L.29 13.08c-.18-.17-.29-.42-.29-.7 0-.28.11-.53.29-.71C3.34 8.78 7.46 7 12 7s8.66 1.78 11.71 4.67c.18.18.29.43.29.71 0 .28-.11.53-.29.71l-2.48 2.48c-.18.18-.43.29-.71.29-.27 0-.52-.11-.7-.28-.79-.74-1.69-1.36-2.67-1.85-.33-.16-.56-.5-.56-.9v-3.1C15.15 9.25 13.6 9 12 9z"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Checkout success overlay -->
  <div class="checkout-success" id="checkoutSuccess">
    <div class="check-icon">&#10003;</div>
    <h2>Order Placed!</h2>
    <div class="order-details" id="orderDetails"></div>
    <button class="continue-btn" id="continueBtn">Continue Shopping</button>
    <div class="powered-by-checkout">Checkout by <a href="https://www.flowblinq.com" target="_blank">FlowBlinq</a></div>
  </div>

  <!-- Audio context for playback -->
  <script src="/static/app.js?v=4"></script>
</body>
</html>
